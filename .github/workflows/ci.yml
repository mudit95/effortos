name: CI

on:
  # Trigger on every branch push so feature work catches type/lint/test
  # regressions before review, not just on the eventual PR.
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Workflow-level concurrency cancels superseded runs (a fast follow-up
# push doesn't pile up runners). Per-job concurrency was inside the job
# which doesn't cancel the install step early.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, type-check, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
        env:
          # Tests should never need real keys; we set placeholders so any
          # accidental import of the env at module scope doesn't crash.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RAZORPAY_KEY_ID: placeholder
          RAZORPAY_KEY_SECRET: placeholder
          RAZORPAY_WEBHOOK_SECRET: placeholder
          ANTHROPIC_API_KEY: placeholder
          RESEND_API_KEY: placeholder
          CRON_SECRET: placeholder

      - name: Next.js production build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          RAZORPAY_KEY_ID: placeholder
          RAZORPAY_KEY_SECRET: placeholder
          RAZORPAY_WEBHOOK_SECRET: placeholder
          ANTHROPIC_API_KEY: placeholder
          RESEND_API_KEY: placeholder
          CRON_SECRET: placeholder
          # Skip Sentry uploads on CI builds.
          SENTRY_DSN: ''
          NEXT_TELEMETRY_DISABLED: '1'
